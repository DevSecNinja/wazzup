---
# Conventional Commit-style issue labels.
feat:
  - '^feat(\(.+\))?:'
  - '/(feature request|enhancement|add support|would be (nice|great)|request)/i'

fix:
  - '^fix(\(.+\))?:'
  - '/(error|crash|fail|broken|not work|doesn.t work|bug)/i'

docs:
  - '^docs(\(.+\))?:'
  - '/(doc|readme|wiki|guide|tutorial|documentation)/i'

ci:
  - '^ci(\(.+\))?:'
  - '/(github action|workflow|pipeline|\.github)/i'

# Area labels.
area/backend:
  - '/(python|pipeline|feed|rss|atom|scoring|copilot|ai provider)/i'

area/frontend:
  - '/(pwa|frontend|ui|css|service worker|manifest|notification)/i'

area/data:
  - '/(data|yaml|json|state|release asset|retention|source|fixture)/i'

area/docs:
  - '/(doc|readme|adr|architecture|requirement)/i'

area/github:
  - '/(github action|workflow|ci|pipeline|label|automation)/i'

area/renovate:
  - '/(renovate|dependency|dependenc|update.*package|package.*update)/i'

question:
  - '/(how (do|to|can)|question|\?)/i'
