---
name: News hourly

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:
    inputs:
      forceBriefing:
        description: "Force briefing kind"
        required: false
        default: hourly
        type: choice
        options:
          - hourly
          - morning
          - evening
      aiProvider:
        description: "AI provider adapter"
        required: false
        default: copilot-cli
        type: choice
        options:
          - copilot-cli
          - fake

permissions:
  contents: read

concurrency:
  group: news-hourly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    name: Generate briefing state
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    permissions:
      contents: write
    env:
      WAZZUP_TIMEZONE: Europe/Amsterdam
      WAZZUP_MAX_AI_ITEMS: 30
      WAZZUP_MAX_AI_COST_USD: "1.00"
      AI_PROVIDER: ${{ inputs.aiProvider || 'copilot-cli' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          version: 2026.4.18

      - name: Set up Node.js for Copilot CLI
        if: ${{ env.AI_PROVIDER == 'copilot-cli' }}
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Copilot CLI
        if: ${{ env.AI_PROVIDER == 'copilot-cli' }}
        run: npm install -g @github/copilot

      - name: Install Python dependencies
        run: task install

      - name: Generate and persist retained news state
        env:
          GH_TOKEN: ${{ github.token }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_REQUESTS_PAT }}
          FORCE_BRIEFING: ${{ inputs.forceBriefing || 'hourly' }}
        run: task news:generate

      - name: Upload generated public artifact
        uses: actions/upload-artifact@v4
        with:
          name: wazzup-public
          path: public
          if-no-files-found: error
          retention-days: 1

      - name: Write workflow summary
        env:
          FORCE_BRIEFING: ${{ inputs.forceBriefing || 'hourly' }}
        run: |-
          set -euo pipefail
          {
            echo "## Wazzup news state"
            echo ""
            echo "- Force briefing: ${FORCE_BRIEFING}"
            echo "- AI provider: ${AI_PROVIDER}"
            echo "- State release: news-state"
            echo "- Pages deployment: handled by the Pages workflow after this run succeeds"
          } >>"${GITHUB_STEP_SUMMARY}"
