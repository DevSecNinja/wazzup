---
name: News hourly

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:
    inputs:
      forceBriefing:
        description: "Force briefing kind"
        required: false
        default: hourly
        type: choice
        options:
          - hourly
          - morning
          - evening
      aiProvider:
        description: "AI provider adapter"
        required: false
        default: copilot-cli
        type: choice
        options:
          - copilot-cli
          - fake

permissions:
  contents: read

concurrency:
  group: news-hourly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    name: Generate and deploy briefing
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: write
      id-token: write
      pages: write
    env:
      WAZZUP_TIMEZONE: Europe/Amsterdam
      WAZZUP_MAX_AI_ITEMS: 30
      WAZZUP_MAX_AI_COST_USD: "1.00"
      AI_PROVIDER: ${{ inputs.aiProvider || 'copilot-cli' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          version: 2026.4.18

      - name: Set up Node.js for Copilot CLI
        if: ${{ env.AI_PROVIDER == 'copilot-cli' }}
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Copilot CLI
        if: ${{ env.AI_PROVIDER == 'copilot-cli' }}
        run: npm install -g @github/copilot

      - name: Install Python dependencies
        run: task install

      - name: Restore retained news state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |-
          set -euo pipefail

          mkdir -p .state
          if gh release download news-state --pattern wazzup-state.zip --dir .state --repo "${GITHUB_REPOSITORY}"; then
            unzip -q -o .state/wazzup-state.zip -d public
            echo "Restored retained news state from the news-state release."
          else
            echo "::notice::No retained news-state release asset found; starting from an empty data window."
          fi

      - name: Generate static briefing data
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_REQUESTS_PAT }}
          FORCE_BRIEFING: ${{ inputs.forceBriefing || 'hourly' }}
        run: python -m wazzup.pipeline --force-briefing "${FORCE_BRIEFING}"

      - name: Validate generated data
        run: task validate:data

      - name: Persist retained news state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |-
          set -euo pipefail

          mkdir -p .state
          (cd public && zip -qr ../.state/wazzup-state.zip data)

          if gh release view news-state --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload news-state .state/wazzup-state.zip --clobber --repo "${GITHUB_REPOSITORY}"
          else
            gh release create news-state .state/wazzup-state.zip \
              --title "Wazzup retained news state" \
              --notes "Rolling generated JSON state for the Wazzup GitHub Pages deployment." \
              --prerelease \
              --repo "${GITHUB_REPOSITORY}"
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
