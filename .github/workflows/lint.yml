---
name: Lint

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    # renovate: datasource=github-tags depName=DevSecNinja/.github
    uses: DevSecNinja/.github/.github/workflows/lint.yml@8487f36bfcc8b040e5541937ba450411f6993e2b # v1.6.1
    permissions:
      contents: read
      security-events: write
    with:
      # renovate: datasource=github-releases depName=jdx/mise
      mise-version: "2026.5.16"
      # No Go in this repo: skip golangci-lint. The reusable workflow still
      # declares golangci-lint-version as a required input, so a value must be
      # provided even though the go job is disabled.
      lint-go: false
      # renovate: datasource=github-releases depName=golangci/golangci-lint
      golangci-lint-version: "v2.12.2"
      lint-config-dir: .
      lint-config-drift: false
      lint-shellcheck: false
      lint-shfmt: false
      lint-checkov: false
      lint-trivy: false
