---
name: Pages

on:
  push:
    branches:
      - main
  workflow_run:
    workflows:
      - News hourly
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  pages:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    # renovate: datasource=github-tags depName=DevSecNinja/.github
    uses: DevSecNinja/.github/.github/workflows/pages.yml@af5030dd0d6f61b80fe58f949c9b985d1931ddf2 # v1.3.0
    permissions:
      contents: read
      deployments: write
      id-token: write
      issues: write
      pages: write
      pull-requests: write
    with:
      # renovate: datasource=node-version depName=node
      node-version: "24"
      node-cache: ""
      # renovate: datasource=npm depName=wrangler
      wrangler-version: "3"
      artifact-path: public
      install-command: |-
        python3 -m pip install --break-system-packages -r requirements.txt
      test-command: PYTHONPATH=src python3 scripts/check_format.py && python3 scripts/lint.py && PYTHONPATH=src python3 -m unittest discover -s tests && python3 -m compileall -q src scripts
      build-command: PYTHONPATH=src python3 scripts/pages_build.py
      cloudflare-preview: false
