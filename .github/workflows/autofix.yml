---
name: Auto-fix formatting

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: autofix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  autofix:
    # renovate: datasource=github-tags depName=DevSecNinja/.github
    uses: DevSecNinja/.github/.github/workflows/autofix.yml@27fd66740c629ea38380dcd3bf93e7bc74c54247 # v1.9.0
    permissions:
      contents: write
    with:
      # renovate: datasource=github-releases depName=jdx/mise
      mise-version: "2026.6.9"
      autofix-config-dir: .
      autofix-shfmt: false
