---
name: News

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:
    inputs:
      forceBriefing:
        description: "Force briefing kind"
        required: false
        default: auto
        type: choice
        options:
          - auto
          - hourly
          - morning
          - evening
      aiProvider:
        description: "AI provider adapter"
        required: false
        default: copilot-cli
        type: choice
        options:
          - copilot-cli
          - fake

permissions:
  contents: read

concurrency:
  group: news-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    name: Generate briefing state
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    permissions:
      actions: write
      contents: write
    env:
      WAZZUP_TIMEZONE: Europe/Amsterdam
      WAZZUP_MAX_AI_ITEMS: 30
      WAZZUP_MAX_AI_COST_USD: "1.00"
      COPILOT_MODEL: claude-sonnet-4.6
      COPILOT_WRITER_MODEL: claude-opus-4.8
      REQUESTED_AI_PROVIDER: ${{ inputs.aiProvider || 'copilot-cli' }}
    steps:
      - name: Check scheduled cadence
        id: cadence
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |-
          set -euo pipefail

          if [[ "${EVENT_NAME}" != "schedule" ]]; then
            echo "should_run=true" >>"${GITHUB_OUTPUT}"
            echo "reason=manual dispatch" >>"${GITHUB_OUTPUT}"
            exit 0
          fi

          local_hour="$(TZ="${WAZZUP_TIMEZONE}" date +%H)"
          hour=$((10#${local_hour}))

          if (( hour >= 6 && hour < 22 && hour % 2 == 1 )); then
            echo "should_run=true" >>"${GITHUB_OUTPUT}"
            echo "reason=active two-hour local cadence" >>"${GITHUB_OUTPUT}"
          else
            echo "should_run=false" >>"${GITHUB_OUTPUT}"
            echo "reason=outside active two-hour local cadence" >>"${GITHUB_OUTPUT}"
          fi

      - name: Checkout code
        if: ${{ steps.cadence.outputs.should_run == 'true' }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up mise
        if: ${{ steps.cadence.outputs.should_run == 'true' }}
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          # renovate: datasource=github-releases depName=jdx/mise
          version: 2026.6.6

      - name: Select AI provider
        if: ${{ steps.cadence.outputs.should_run == 'true' }}
        id: ai
        env:
          COPILOT_TOKEN: ${{ secrets.COPILOT_REQUESTS_PAT || secrets.COPILOT_GITHUB_TOKEN }}
        run: |-
          set -euo pipefail

          provider="${REQUESTED_AI_PROVIDER}"
          case "${provider}" in
            copilot-cli|fake) ;;
            *)
              echo "::error::Unsupported AI provider: ${provider}"
              exit 1
              ;;
          esac

          if [[ "${provider}" == "copilot-cli" && -z "${COPILOT_TOKEN}" ]]; then
            echo "::warning::Copilot CLI was requested, but neither COPILOT_REQUESTS_PAT nor COPILOT_GITHUB_TOKEN is configured. Falling back to AI_PROVIDER=fake for this run."
            provider="fake"
          fi

          echo "provider=${provider}" >>"${GITHUB_OUTPUT}"

      - name: Set up Node.js for Copilot CLI
        if: ${{ steps.ai.outputs.provider == 'copilot-cli' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install Copilot CLI
        if: ${{ steps.ai.outputs.provider == 'copilot-cli' }}
        run: npm install -g @github/copilot

      - name: Install Python dependencies
        if: ${{ steps.cadence.outputs.should_run == 'true' }}
        run: task install

      - name: Generate and persist retained news state
        if: ${{ steps.cadence.outputs.should_run == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          AI_PROVIDER: ${{ steps.ai.outputs.provider }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_REQUESTS_PAT || secrets.COPILOT_GITHUB_TOKEN }}
          COPILOT_MODEL: ${{ env.COPILOT_MODEL }}
          COPILOT_WRITER_MODEL: ${{ env.COPILOT_WRITER_MODEL }}
          FORCE_BRIEFING: ${{ inputs.forceBriefing || 'auto' }}
        run: task news:generate

      - name: Upload generated public artifact
        if: ${{ steps.cadence.outputs.should_run == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wazzup-public
          path: public
          if-no-files-found: error
          retention-days: 1

      - name: Deploy refreshed state to Pages
        if: ${{ steps.cadence.outputs.should_run == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |-
          set -euo pipefail
          # Dispatch the Pages deploy explicitly. The cross-workflow
          # workflow_run trigger does not fire for News runs started by
          # workflow_dispatch (manual or the news-watchdog catch-up), which
          # left freshly persisted state undeployed. Dispatching here covers
          # every trigger type.
          gh workflow run pages.yml --repo "${GITHUB_REPOSITORY}" --ref "${GITHUB_REF_NAME}"
          echo "Dispatched Pages deployment for refreshed news state."

      - name: Write workflow summary
        if: ${{ steps.cadence.outputs.should_run == 'true' }}
        env:
          FORCE_BRIEFING: ${{ inputs.forceBriefing || 'auto' }}
          AI_PROVIDER: ${{ steps.ai.outputs.provider }}
          COPILOT_MODEL: ${{ env.COPILOT_MODEL }}
          COPILOT_WRITER_MODEL: ${{ env.COPILOT_WRITER_MODEL }}
        run: |-
          set -euo pipefail
          {
            echo "## Wazzup news state"
            echo ""
            echo "- Force briefing: ${FORCE_BRIEFING}"
            echo "- Requested AI provider: ${REQUESTED_AI_PROVIDER}"
            echo "- Effective AI provider: ${AI_PROVIDER}"
            echo "- Copilot model: ${COPILOT_MODEL}"
            echo "- Copilot writer model: ${COPILOT_WRITER_MODEL}"
            echo "- State release: news-state"
            echo "- Pages deployment: dispatched explicitly after persisting state"
          } >>"${GITHUB_STEP_SUMMARY}"

      - name: Write skipped summary
        if: ${{ steps.cadence.outputs.should_run != 'true' }}
        env:
          CADENCE_REASON: ${{ steps.cadence.outputs.reason }}
        run: |-
          {
            echo "## Wazzup news state"
            echo ""
            echo "- Skipped scheduled run: ${CADENCE_REASON}"
            echo "- Active cadence: every two hours from 07:00 to 21:59 local time"
            echo "- Overnight cadence: skipped"
          } >>"${GITHUB_STEP_SUMMARY}"
