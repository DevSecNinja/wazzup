---
name: Labeler

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  issues:
    types:
      - opened
      - edited

permissions:
  contents: read

concurrency:
  group: labeler-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

jobs:
  labeler:
    # renovate: datasource=github-tags depName=DevSecNinja/.github
    uses: DevSecNinja/.github/.github/workflows/labeler.yml@7f2abdd838a855dba31a2b2de6358529fdcef09d # v1.8.0
    permissions:
      contents: read
      pull-requests: write
      issues: write
