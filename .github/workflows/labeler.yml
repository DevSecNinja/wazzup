---
name: Labeler

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  issues:
    types:
      - opened
      - edited

permissions:
  contents: read

concurrency:
  group: labeler-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

jobs:
  labeler:
    # renovate: datasource=github-tags depName=DevSecNinja/.github
    uses: DevSecNinja/.github/.github/workflows/labeler.yml@998ff283c3a431bbcb74421180121826cca8fdd7 # v1.4.0
    permissions:
      contents: read
      pull-requests: write
      issues: write
