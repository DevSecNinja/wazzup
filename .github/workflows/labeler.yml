---
name: Labeler

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  issues:
    types:
      - opened
      - edited

permissions:
  contents: read

concurrency:
  group: labeler-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

jobs:
  labeler:
    # renovate: datasource=github-tags depName=DevSecNinja/.github
    uses: DevSecNinja/.github/.github/workflows/labeler.yml@8487f36bfcc8b040e5541937ba450411f6993e2b # v1.6.1
    permissions:
      contents: read
      pull-requests: write
      issues: write
